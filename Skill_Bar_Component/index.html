<!DOCTYPE html>
<html>
<head>
    <title>Skill Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Skills</h1>

<div class="skill">
    <p>HTML</p>
    <div class="bar">
        <div class="progress html">80%</div>
    </div>
</div>

<div class="skill">
    <p>CSS</p>
    <div class="bar">
        <div class="progress css">70%</div>
    </div>
</div>

<div class="skill">
    <p>JavaScript</p>
    <div class="bar">
        <div class="progress js">100%</div>
    </div>
</div>

</body>
</html>
